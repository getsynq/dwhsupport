name: dwhctl - Release binaries

on:
  push:
    tags:
      - v*.*.*

defaults:
  run:
    shell: bash
    working-directory: cli

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            suffix: linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          # macOS runner cross-compiles the amd64 build (no CGO, so this is safe).
          - os: macos-latest
            goos: darwin
            goarch: amd64
            suffix: darwin-amd64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Derive version
        id: version
        # The binary version tracks the library release tag (e.g. v0.9.0).
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          # Pure-Go build (DuckDB, the only CGO driver, is excluded); static binaries.
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags "-s -w -X github.com/getsynq/dwhsupport/cli/cmd.version=${{ steps.version.outputs.version }}" \
            -o dwhctl-${{ matrix.suffix }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dwhctl-${{ matrix.suffix }}
          path: cli/dwhctl-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
